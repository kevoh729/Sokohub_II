<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SokoHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">
                <a href="index.html" aria-label="SokoHub home">
                    <img src="sokohub.jpg" alt="SokoHub logo" class="site-logo">
                </a>
            </div>
            <div class="header-icons">
                <a href="login.html" class="login-link" title="Login">👤</a>
            </div>
        </div>
    </header>

    <div class="page-crumb">
        <a href="index.html">Home</a>
        <span class="separator">›</span>
        <span>Login</span>
    </div>

    <main style="padding: 40px 20px; max-width:480px; margin: 24px auto;">
        <h2 style="margin-bottom:12px;">Welcome back</h2>
        <p style="margin-bottom:20px; color:#666;">Sign in to access your account and orders.</p>
        <form id="loginForm">
            <label style="display:block; margin-bottom:8px; font-weight:600;">Email</label>
            <input type="email" placeholder="you@example.com" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:12px;">
            <label style="display:block; margin-bottom:8px; font-weight:600;">Password</label>
            <input type="password" placeholder="Password" required style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:16px;">
            <button type="submit" style="width:100%; padding:12px; background:#B11226; color:white; border:none; border-radius:8px; font-weight:700;">Sign In</button>
        </form>
    </main>

    <footer style="padding:40px 20px; text-align:center;">
        <p class="footer-text">&copy; 2026 SokoHub</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            window.location.href = 'j.html';
        });
    </script>
</body>
</html>
