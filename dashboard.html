<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SokoHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .header { background: #25D366; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .logout-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
    .container { padding: 20px; max-width: 800px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h2 { color: #333; margin-bottom: 16px; font-size: 18px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .info-item { padding: 12px; background: #f9f9f9; border-radius: 8px; }
    .info-item label { display: block; color: #666; font-size: 12px; margin-bottom: 4px; }
    .info-item span { color: #333; font-size: 16px; font-weight: 500; }
    .welcome { text-align: center; padding: 40px; }
    .welcome h2 { color: #25D366; font-size: 28px; margin-bottom: 8px; }
    .welcome p { color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>💚 SokoHub Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  
  <div class="container">
    <div class="card">
      <div class="welcome">
        <h2>Welcome!</h2>
        <p>Logged in via WhatsApp</p>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <label>Seller ID</label>
          <span id="sellerId">-</span>
        </div>
        <div class="info-item">
          <label>WhatsApp</label>
          <span id="whatsapp">-</span>
        </div>
      </div>
    </div>
    
    <div class="card">
      <h2>Quick Actions</h2>
      <p><a href="index.html"> Browse Products</a></p>
      <p><a href="product.html"> Add Product</a></p>
    </div>
  </div>
  
  <script>
    const token = localStorage.getItem('token');
    const sellerId = localStorage.getItem('sellerId');
    
    if (!token || !sellerId) {
      window.location.href = '/wa-login.html';
      throw new Error('Not authenticated');
    }
    
    document.getElementById('sellerId').textContent = sellerId;
    
    // Fetch seller info
    fetch('/api/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(res => res.json())
    .then(data => {
      if (data.whatsapp) {
        document.getElementById('whatsapp').textContent = data.whatsapp;
      }
    })
    .catch(() => {
      // Continue showing dashboard even if API fails
    });
    
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('sellerId');
      window.location.href = '/wa-login.html';
    }
  </script>
</body>
</html>
