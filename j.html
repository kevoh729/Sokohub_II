<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SokoHub Seller Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f6f7f9;
      display:flex;
      min-height:100vh;
      color:#222;
    }

    /* SIDEBAR */

    .sidebar{
      width:260px;
      background:white;
      padding:24px;
      border-right:1px solid #eee;
      position:fixed;
      left:0;
      top:0;
      height:100vh;
      overflow-y:auto;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:28px;
    }

    .logo img{
      width:150px;
      max-width:100%;
      height:auto;
      display:block;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu a{
      text-decoration:none;
      padding:14px 16px;
      border-radius:14px;
      color:#555;
      font-weight:500;
      transition:0.3s;
    }

    .menu a:hover,
    .menu .active{
      background:linear-gradient(
      135deg,
      #d62828,
      #f77f00
      );

      color:white;
      transform:translateX(4px);
    }

    /* MAIN */

    .main{
      margin-left:260px;
      width:calc(100% - 260px);
      padding:28px;
    }

    /* TOPBAR */

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:35px;
      flex-wrap:wrap;
      gap:20px;
    }

    .welcome h1{
      font-size:38px;
      margin-bottom:5px;
    }

    .welcome p{
      color:#777;
    }

    /* MAIN GRID */

    .dashboard-grid{
      display:grid;
      grid-template-columns:minmax(320px, 0.85fr) minmax(0, 1.15fr);
      gap:24px;
    }

    /* PRODUCTS */

    .products{
      background:white;
      border-radius:22px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    .section-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      flex-wrap:wrap;
      gap:20px;
    }

    .section-top h2{
      font-size:28px;
    }

    .product-row{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .product-row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto auto;
      gap:16px;
      align-items:center;
      padding:14px;
      border:1px solid #eee;
      border-radius:18px;
      background:#fff;
    }

    .product-info{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .product-info img{
      width:65px;
      height:65px;
      border-radius:18px;
      object-fit:cover;
    }

    .product-meta{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .price{
      color:#d62828;
      font-weight:700;
    }

    .status{
      background:#dcfce7;
      color:#16a34a;
      padding:8px 14px;
      border-radius:50px;
      font-size:13px;
      font-weight:600;
      width:fit-content;
    }

    .action-btn{
      padding:10px 18px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    .delete{
      background:#fee2e2;
      color:#d62828;
    }

    .action-btn:hover{
      transform:translateY(-3px);
    }

    .empty-state,
    .form-message{
      color:#777;
      font-size:14px;
    }

    .form-message{
      min-height:22px;
      margin-top:14px;
      font-weight:600;
    }

    .form-message.success{
      color:#16a34a;
    }

    .form-message.error{
      color:#d62828;
    }

    .product-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    /* UPLOAD PANEL */

    .upload-panel{
      background:white;
      border-radius:22px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
      order:1;
    }

    .upload-panel h2{
      margin-bottom:25px;
      font-size:28px;
    }

    .upload-panel form{
      display:flex;
      flex-direction:column;
      gap:0;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:10px;
      font-weight:600;
      font-size:15px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#f5f5f5;
      font-size:15px;
    }

    textarea{
      resize:none;
      height:100px;
    }

    .upload-box{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      width:100%;
      min-height:150px;
      padding:28px 20px;
      border:2px dashed #f77f00;
      border-radius:20px;
      text-align:center;
      color:#777;
      background:#fff9f5;
      margin-bottom:20px;
      cursor:pointer;
      transition:0.3s;
      font-size:16px;
      line-height:1.4;
      word-break:break-word;
    }

    .upload-box:hover{
      background:#fff3eb;
    }

    .publish-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;

      background:linear-gradient(
      135deg,
      #d62828,
      #f77f00
      );

      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
    }

    .publish-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 25px rgba(214,40,40,0.3);
    }

    .publish-btn:active{
      transform:translateY(0);
    }

    /* TABLET & MOBILE */

    @media(max-width:1100px){

      .dashboard-grid{
        grid-template-columns:1fr;
      }

      .upload-panel{
        order:0;
      }

    }

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
        height:auto;
        position:sticky;
        top:0;
        border-right:none;
        border-bottom:1px solid #eee;
        padding:14px 16px;
        z-index:1000;
      }

      .logo{
        margin-bottom:12px;
      }

      .logo img{
        width:120px;
      }

      .menu{
        flex-direction:row;
        overflow-x:auto;
        gap:8px;
        padding-bottom:4px;
      }

      .menu a{
        white-space:nowrap;
        padding:10px 14px;
        border-radius:999px;
        font-size:14px;
      }

      .menu a:hover,
      .menu .active{
        transform:none;
      }

      .main{
        width:100%;
        margin-left:0;
      }

      .welcome h1{
        font-size:30px;
      }

    }

    @media(max-width:640px){

      .main{
        padding:18px 14px;
      }

      .topbar{
        align-items:flex-start;
        margin-bottom:20px;
      }

      .welcome h1{
        font-size:26px;
      }

      .products,
      .upload-panel{
        padding:18px;
        border-radius:18px;
      }

      .section-top{
        align-items:stretch;
      }

      .section-top h2,
      .upload-panel h2{
        font-size:22px;
      }

      .product-row{
        grid-template-columns:1fr;
      }

      .product-info img{
        width:56px;
        height:56px;
        border-radius:14px;
      }

      .product-meta{
        justify-content:space-between;
      }

      .product-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
      }

      .action-btn{
        width:100%;
      }

      .upload-box{
        min-height:120px;
        padding:22px 16px;
        margin-bottom:18px;
      }

    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      <img src="sokohub.png" alt="SokoHub logo">
    </div>

    <div class="menu">

      <a href="#" class="active">
        Dashboard
      </a>

      <a href="#" id="logout-link">
        Logout
      </a>

    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

      <div class="welcome">
        <h1>Welcome Back 👋</h1>
        <p>Manage your products and grow your business.</p>
      </div>



    </div>

    <!-- UPLOAD & PRODUCTS CONTAINER -->

    <div class="dashboard-grid">

      <!-- UPLOAD PANEL -->

      <div class="upload-panel">

        <h2>Publish a Product</h2>

        <form id="product-form">
        <label class="upload-box" for="product-image">
          📸 Click To Upload Product Image
        </label>
        <input id="product-image" type="file" accept="image/*" style="display:none;">

        <div class="form-group">
          <label for="product-name">Product Title</label>

          <input id="product-name" type="text" placeholder="Enter product name" required>
        </div>

        <div class="form-group">
          <label for="product-price">Price</label>

          <input id="product-price" type="number" min="0" step="0.01" placeholder="KSh 0.00" required>
        </div>

        <div class="form-group">
          <label for="product-category">Category</label>

          <select id="product-category">
            <option>Electronics</option>
            <option>Fashion</option>
            <option>Furniture</option>
            <option>Beauty</option>
          </select>
        </div>

        <div class="form-group">
          <label for="product-description">Description</label>

          <textarea id="product-description" placeholder="Write product details..." required></textarea>
        </div>

        <button class="publish-btn" type="submit">
          Publish Product
        </button>
        <div id="form-message" class="form-message"></div>
        </form>

      </div>

      <!-- PRODUCTS -->

      <div class="products">

        <div class="section-top">

          <h2>My Products</h2>

        </div>

        <div class="product-list" id="product-list">
          <div class="empty-state">Loading your products...</div>
        </div>

      </div>

    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    let userEmail = localStorage.getItem('userEmail');
    let userName = localStorage.getItem('userName') || 'Seller';
    const productList = document.getElementById('product-list');
    const productForm = document.getElementById('product-form');
    const messageBox = document.getElementById('form-message');
    const uploadLabel = document.querySelector('.upload-box');
    const imageInput = document.getElementById('product-image');

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function setMessage(message, type) {
      messageBox.textContent = message;
      messageBox.classList.remove('success', 'error');
      messageBox.classList.add(type);
    }

    function formatPrice(value) {
      return `KSh ${Number(value || 0).toLocaleString('en-KE')}`;
    }

    function clearSavedLogin() {
      localStorage.removeItem('token');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userName');
    }

    async function requireValidSession() {
      if (!token) {
        window.location.replace('/goin.html');
        return false;
      }

      const response = await fetch('/api/me', {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await response.json();

      if (!response.ok) {
        clearSavedLogin();
        window.location.replace('/goin.html');
        return false;
      }

      userEmail = data.email;
      userName = data.name || userName;
      localStorage.setItem('userEmail', userEmail);
      localStorage.setItem('userName', userName);
      document.querySelector('.welcome h1').textContent = `Welcome Back, ${userName}`;
      document.querySelector('.profile strong').textContent = userName;
      return true;
    }

    async function uploadImage(file) {
      if (!file) return null;

      const formData = new FormData();
      formData.append('image', file);

      const response = await fetch('/api/upload', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData
      });
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Image upload failed');
      }

      return data.imageUrl;
    }

    async function loadProducts() {
      if (!userEmail) return;

      const response = await fetch('/api/my-products', {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await response.json();

      if (!response.ok) {
        clearSavedLogin();
        window.location.replace('/goin.html');
        return;
      }

      const products = data || [];

      if (!products.length) {
        productList.innerHTML = '<div class="empty-state">No products yet. Publish your first product from the upload panel.</div>';
        return;
      }

      productList.innerHTML = products.map((product) => `
        <div class="product-row">
          <div class="product-info">
            <img src="${escapeHtml(product.image_url)}" alt="${escapeHtml(product.name)}">
            <div>
              <strong>${escapeHtml(product.name)}</strong>
              <p style="color:#777;font-size:14px;">${escapeHtml(product.description)}</p>
            </div>
          </div>

          <div class="product-meta">
            <span class="price">${formatPrice(product.price)}</span>
            <span class="status">Active</span>
          </div>

          <div class="product-actions">
            <button class="action-btn delete" type="button" data-product-id="${escapeHtml(product.id)}">Delete</button>
          </div>
        </div>
      `).join('');

      productList.querySelectorAll('.delete').forEach((button) => {
        button.addEventListener('click', () => deleteProduct(button.dataset.productId));
      });
    }

    async function deleteProduct(productId) {
      const response = await fetch(`/api/products/${encodeURIComponent(productId)}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });

      if (response.ok) {
        loadProducts();
      }
    }

    imageInput.addEventListener('change', () => {
      uploadLabel.textContent = imageInput.files[0] ? imageInput.files[0].name : '📸 Click To Upload Product Image';
    });

    document.getElementById('logout-link').addEventListener('click', async (event) => {
      event.preventDefault();
      if (token) {
        await fetch('/api/logout', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` }
        });
      }
      clearSavedLogin();
      window.location.href = '/goin.html';
    });

    productForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const productName = document.getElementById('product-name').value.trim();
      const price = document.getElementById('product-price').value;
      const category = document.getElementById('product-category').value;
      const description = document.getElementById('product-description').value.trim();

      try {
        setMessage('Publishing product...', 'success');
        const uploadedImageUrl = await uploadImage(imageInput.files[0]);
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            name: productName,
            price,
            category,
            description,
            image_url: uploadedImageUrl
          })
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to publish product');
        }

        productForm.reset();
        uploadLabel.textContent = '📸 Click To Upload Product Image';
        setMessage('Product published successfully.', 'success');
        loadProducts();
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });

    requireValidSession().then((isValid) => {
      if (isValid) {
        loadProducts();
      }
    });
  </script>
</body>
</html>
