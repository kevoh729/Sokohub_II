<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SokoHub Seller Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sokohub.css">
  <style>
    body {
      min-height: 100vh;
      background: #f6f7f9;
    }

    .auth-shell {
      width: min(480px, calc(100% - 32px));
      margin: 48px auto;
      background: white;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .auth-tab {
      border: 1px solid #e5e5e5;
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .auth-tab.active {
      background: #B11226;
      border-color: #B11226;
      color: white;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-field {
      margin-bottom: 14px;
    }

    .form-field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-field input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font: inherit;
    }

    .auth-submit {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 8px;
      background: #B11226;
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 4px;
    }

    .auth-message {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .auth-message.success {
      color: #16803a;
    }

    .auth-message.error {
      color: #B11226;
    }

    /* Google Sign-In button styling */
    .google-divider {
      text-align: center;
      margin: 20px 0 16px;
      position: relative;
      color: #888;
      font-size: 13px;
    }

    .google-divider::before,
    .google-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e5e5e5;
    }

    .google-divider::before { left: 0; }
    .google-divider::after { right: 0; }

    .google-btn-wrapper {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }

    #googleButton {
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="logo">
        <a href="/" aria-label="SokoHub home">
          <img src="sokohub.jpg" alt="SokoHub logo" class="site-logo">
        </a>
      </div>
      <div class="header-icons">
        <a href="index.html" class="login-link" title="Home">Home</a>
        <a href="goin.html" class="login-link" title="Login">👤</a>
        <a href="cart.html" class="cart-link" title="Cart">🛒</a>
      </div>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-tabs">
      <button class="auth-tab active" id="signin-tab" type="button">Sign In</button>
      <button class="auth-tab" id="signup-tab" type="button">Sign Up</button>
    </div>

    <form id="signin-form" class="auth-form active">
      <h2 style="margin-bottom: 6px;">Welcome back</h2>
      <p style="margin-bottom: 20px; color: #666;">Sign in to manage your seller products.</p>

      <div class="google-btn-wrapper">
        <div id="googleButton"></div>
      </div>

      <div class="google-divider">or sign in with email</div>

      <div class="form-field">
        <label for="signin-email">Email</label>
        <input id="signin-email" type="email" placeholder="you@example.com" required>
      </div>

      <div class="form-field">
        <label for="signin-password">Password</label>
        <input id="signin-password" type="password" placeholder="Password" required>
      </div>

      <button class="auth-submit" type="submit">Sign In</button>
      <div id="signin-message" class="auth-message"></div>
    </form>

    <form id="signup-form" class="auth-form">
      <h2 style="margin-bottom: 6px;">Create seller account</h2>
      <p style="margin-bottom: 20px; color: #666;">Register, then start publishing products.</p>

      <div class="google-btn-wrapper">
        <div id="googleSignupButton"></div>
      </div>

      <div class="google-divider">or sign up with email</div>

      <div class="form-field">
        <label for="signup-name">Full Name</label>
        <input id="signup-name" type="text" placeholder="Your name" required>
      </div>

      <div class="form-field">
        <label for="signup-email">Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" required>
      </div>

      <div class="form-field">
        <label for="signup-whatsapp">WhatsApp Number</label>
        <input id="signup-whatsapp" type="tel" placeholder="+254712345678" pattern="^\+?[0-9]{7,15}$" required>
      </div>

      <div class="form-field">
        <label for="signup-password">Password</label>
        <input id="signup-password" type="password" placeholder="At least 6 characters" required>
      </div>

      <div class="form-field">
        <label for="signup-confirm-password">Confirm Password</label>
        <input id="signup-confirm-password" type="password" placeholder="Repeat password" required>
      </div>

      <button class="auth-submit" type="submit">Sign Up</button>
      <div id="signup-message" class="auth-message"></div>
    </form>
  </main>

  <!-- Google Sign-In Library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    const API_URL = ''; // Empty means use same origin (your backend serves this page)
    
    const signinTab = document.getElementById('signin-tab');
    const signupTab = document.getElementById('signup-tab');
    const signinForm = document.getElementById('signin-form');
    const signupForm = document.getElementById('signup-form');

    function showForm(formName) {
      const showSignup = formName === 'signup';
      signinForm.classList.toggle('active', !showSignup);
      signupForm.classList.toggle('active', showSignup);
      signinTab.classList.toggle('active', !showSignup);
      signupTab.classList.toggle('active', showSignup);
    }

    function setMessage(element, message, type) {
      if (!element) return;
      element.textContent = message;
      element.classList.remove('success', 'error');
      element.classList.add(type);
    }

    function getActiveMessageElement() {
      const activeForm = document.querySelector('.auth-form.active');
      return activeForm ? activeForm.querySelector('.auth-message') : null;
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function storeUser(email, name, token, sellerId) {
      if (email) localStorage.setItem('userEmail', email);
      localStorage.setItem('userName', name || email || 'Seller');
      if (token) localStorage.setItem('token', token);
      if (sellerId) localStorage.setItem('sellerId', sellerId);
    }

    // ============= GOOGLE SIGN-IN HANDLER =============
    function handleGoogleResponse(response) {
      const googleToken = response.credential;
      
      fetch('/api/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: googleToken })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          storeUser(data.email, data.name, data.token, data.sellerId);
          setMessage(getActiveMessageElement(), 'Google sign in successful! Redirecting...', 'success');
          window.location.href = '/server_dashboard.html';
        } else if (data.needsSignup) {
          // First time Google user - store temp token and redirect to complete profile
          localStorage.setItem('tempToken', data.tempToken);
          localStorage.setItem('tempEmail', data.email);
          localStorage.setItem('tempName', data.name);
          window.location.href = '/complete-signup.html';
        } else {
          setMessage(getActiveMessageElement(), data.error || 'Google sign in failed', 'error');
        }
      })
      .catch(err => {
        console.error('Google auth error:', err);
        setMessage(document.getElementById('signin-message'), 'Network error. Please try again.', 'error');
      });
    }

    // Initialize Google Sign-In button
    window.onload = () => {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.id.initialize({
          client_id: '874860608695-tnutaoj7mdpa2mp2547fubiucjbq1ihm.apps.googleusercontent.com',
          callback: handleGoogleResponse
        });
        google.accounts.id.renderButton(
          document.getElementById('googleButton'),
          { theme: 'outline', size: 'large', width: '100%' }
        );
        const googleSignupEl = document.getElementById('googleSignupButton');
        if (googleSignupEl) {
          google.accounts.id.renderButton(
            googleSignupEl,
            { theme: 'outline', size: 'large', width: '100%' }
          );
        }
      }
    };

    signinTab.addEventListener('click', () => showForm('signin'));
    signupTab.addEventListener('click', () => showForm('signup'));

    signinForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const message = document.getElementById('signin-message');

      setMessage(message, 'Email/password login is not configured yet. Please sign in with Google.', 'error');
    });

    signupForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const whatsapp = document.getElementById('signup-whatsapp').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('signup-confirm-password').value;
      const message = document.getElementById('signup-message');

      if (password !== confirmPassword) {
        setMessage(message, 'Passwords do not match', 'error');
        return;
      }

      if (password.length < 6) {
        setMessage(message, 'Password must be at least 6 characters', 'error');
        return;
      }

      if (!/^\+?[0-9]{7,15}$/.test(whatsapp)) {
        setMessage(message, 'Enter a valid WhatsApp number', 'error');
        return;
      }

      if (!isValidEmail(email)) {
        setMessage(message, 'Enter a valid email address', 'error');
        return;
      }

      setMessage(message, 'Email/password signup is not configured yet. Please use Google signup.', 'error');
    });
  </script>
</body>
</html>
