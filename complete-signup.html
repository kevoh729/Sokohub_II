<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Profile - SokoHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sokohub.css">
  <script src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.development.js" async></script>
  <style>
    body {
      min-height: 100vh;
      background: #f6f7f9;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .signup-shell {
      width: min(480px, calc(100% - 32px));
      background: white;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }
    .signup-shell h2 {
      margin-bottom: 6px;
    }
    .signup-shell p {
      margin-bottom: 20px;
      color: #666;
    }
    .form-field {
      margin-bottom: 14px;
    }
    .form-field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-field input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font: inherit;
    }
    .phone-input-group { display:flex; gap:8px; align-items:center; }
    .phone-prefix { background:#f1f1f1; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-weight:700; }
    .phone-input-group input { flex:1; padding:12px; border-radius:8px; border:1px solid #ddd; }
    .submit-btn {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 8px;
      background: #B11226;
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 4px;
    }
    .form-message {
      min-height: 22px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 600;
    }
    .form-message.success { color: #16803a; }
    .form-message.error { color: #B11226; }
  </style>
</head>
<body>
  <div class="signup-shell">
    <h2>Complete Your Profile</h2>
    <p>Please provide your WhatsApp number to complete registration.</p>
    <form id="complete-signup-form">
      <div class="form-field">
        <label for="name">Full Name</label>
        <input id="name" type="text" required>
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" type="email" required>
      </div>
      <div class="form-field">
        <label for="whatsapp-local">WhatsApp Number</label>
        <div class="phone-input-group">
          <span class="phone-prefix">+254</span>
          <input id="whatsapp-local" type="tel" placeholder="712345678" required>
        </div>
      </div>
      <button class="submit-btn" type="submit">Complete Registration</button>
      <div id="form-message" class="form-message"></div>
    </form>
  </div>
  <script>
    const tempToken = localStorage.getItem('tempToken');
    const tempEmail = localStorage.getItem('tempEmail');
    const tempName = localStorage.getItem('tempName');
    document.getElementById('name').value = tempName || '';
    document.getElementById('email').value = tempEmail || '';
    if (!tempToken) {
      window.location.href = '/login.html';
    }
    function setMessage(message, type) {
      const msgEl = document.getElementById('form-message');
      msgEl.textContent = message;
      msgEl.classList.remove('success', 'error');
      msgEl.classList.add(type);
    }
    document.getElementById('complete-signup-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const local = (document.getElementById('whatsapp-local') && document.getElementById('whatsapp-local').value) ? document.getElementById('whatsapp-local').value.trim() : '';
      let whatsapp = '';
      if (!local) {
        setMessage('Enter a valid WhatsApp number', 'error');
        return;
      }
      // clean and prepend +254
      let cleaned = local.replace(/\D/g, '');
      cleaned = cleaned.replace(/^0+/, '');
      if (!cleaned) { setMessage('Enter a valid WhatsApp number', 'error'); return; }
      whatsapp = '+254' + cleaned;
      try {
        setMessage('Completing registration...', 'success');
        const response = await fetch('/api/auth/complete-signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tempToken, name, whatsapp })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('sellerId', data.sellerId);
        localStorage.setItem('userEmail', tempEmail);
        localStorage.setItem('userName', name);
        localStorage.removeItem('tempToken');
        localStorage.removeItem('tempEmail');
        localStorage.removeItem('tempName');
        setMessage('Registration successful! Redirecting...', 'success');
        window.location.href = '/server_dashboard.html';
      } catch (error) {
        setMessage(error.message, 'error');
      }
    });
  </script>
</body>
</html>
