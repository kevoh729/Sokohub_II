<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food & Drinks - SokoHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
    <link rel="stylesheet" href="foodanddrinks.css">
    <link rel="preload" href="foodanddrinks.js" as="script">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
                <div class="logo">
                    <a href="index.html" aria-label="SokoHub home">
                        <img src="sokohub.jpg" alt="SokoHub logo" class="site-logo">
                    </a>
                </div>
            <div class="header-icons">
                <a href="login.html" class="login-link" title="Login">👤</a>
                <a href="cart.html" class="cart-link" title="Cart">🛒</a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search food and drinks...">
            <button class="search-btn">Search</button>
        </div>
    </header>

    <div class="page-crumb" aria-hidden="false">
        <a href="index.html">Home</a>
        <span class="separator">›</span>
        <span>Food & Drinks</span>
    </div>

    <!-- CATEGORIES SCROLL -->
    <div class="categories" id="categoriesScroll">
        <button class="category-chip active" onclick="filterCategory(this)">All</button>
        <button class="category-chip" onclick="filterCategory(this)">Packed Lunch</button>
        <button class="category-chip" onclick="filterCategory(this)">Takeaway Meals</button>
        <button class="category-chip" onclick="filterCategory(this)">Energy Drinks</button>
        <button class="category-chip" onclick="filterCategory(this)">Juice</button>
        <button class="category-chip" onclick="filterCategory(this)">Milk</button>
        <button class="category-chip" onclick="filterCategory(this)">Coffee</button>
        <button class="category-chip" onclick="filterCategory(this)">Biscuits</button>
        <button class="category-chip" onclick="filterCategory(this)">Crisps</button>
        <button class="category-chip" onclick="filterCategory(this)">Chocolate</button>
        <button class="category-chip" onclick="filterCategory(this)">Sweets</button>
        <button class="category-chip" onclick="filterCategory(this)">Cookies</button>
        <button class="category-chip" onclick="filterCategory(this)">Cakes</button>
        <button class="category-chip" onclick="filterCategory(this)">Instant Noodles</button>
    </div>
      
    <!-- HERO BANNER -->
    <section class="hero">
        <h1>Delicious Deals</h1>
        <p>Fresh meals and tasty snacks</p>
        <button class="hero-btn" onclick="shopNow()">Start Shopping</button>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="products-section">
        <div class="section-title">Popular Items</div>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be generated by JavaScript -->
        </div>
    </section>
<!-- FOOTER -->
    <footer>
        <div class="footer-links">
            <a href="#about">About Us</a>
            <a href="#contact">Contact</a>
            <a href="#privacy">Privacy</a>
            <a href="#terms">Terms</a>
        </div>
        <p class="footer-text">&copy; 2026 SokoHub. All rights reserved. | Making Shopping Easier for Murang'a</p>
    </footer>

    <script src="sokohub.js"></script>
    <script src="foodanddrinks.js"></script>
</body>
</html>
