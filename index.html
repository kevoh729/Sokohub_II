<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokoHub - African E-commerce Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo"><a href="index.html"><img src="sokohub.jpg" alt="SokoHub logo" class="site-logo"></a></div>
            <div class="header-icons">
                <a href="goin.html" class="header-btn account-btn">👤 Account</a>
                <a href="cart.html" class="header-btn cart-btn">🛒 Cart <span id="cartCount" class="cart-badge"></span></a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search products...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
    </header>

    <div class="categories" id="categoriesScroll">
        <a href="index.html" class="category-chip active">All</a>
        <a href="devices.html" class="category-chip">Electronics</a>
        <a href="fashion.html" class="category-chip">Fashion</a>
        <a href="foodanddrinks.html" class="category-chip">Food & Drinks</a>
        <a href="houseitems.html" class="category-chip">House Items</a>
        <a href="rentals.html" class="category-chip">Rentals</a>
        <a href="studyessentials.html" class="category-chip">Study Essentials</a>
        <a href="roomitems.html" class="category-chip">Room Items</a>
    </div>

    <section class="hero">
        <h1>Mega Murang'a Deals</h1>
        <p>Making Shopping Easier</p>
        <button class="hero-btn" onclick="shopNow()">Start Shopping</button>
    </section>

    <section class="products-section">
        <div class="section-title">All Products</div>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="#about">About Us</a>
            <a href="#contact">Contact</a>
            <a href="#privacy">Privacy</a>
            <a href="#terms">Terms</a>
        </div>
        <p class="footer-text">&copy; 2026 SokoHub. All rights reserved.</p>
    </footer>

    <script src="sokohub.js"></script>
</body>
</html>
