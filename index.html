<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokoHub - African E-commerce Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
    <link rel="preload" href="sokohub.js" as="script">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
                <div class="logo">
                    <a href="index.html" aria-label="SokoHub home">
                        <img src="sokohub.jpg" alt="SokoHub logo" class="site-logo">
                    </a>
                </div>
            <div class="header-icons">
                <a href="login.html" class="login-link" title="Login">👤</a>
                <a href="cart.html" class="cart-link" title="Cart">🛒</a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search products, brands...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
    </header>

    <!-- CATEGORIES SCROLL -->
    <div class="categories" id="categoriesScroll">
        <a href="sokohub.html" class="category-chip active">All</a>
        <a href="devices.html" class="category-chip">Electronics</a>
        <a href="fashion.html" class="category-chip">Fashion</a>
        <a href="foodanddrinks.html" class="category-chip">Food & Drinks</a>
        <a href="houseitems.html" class="category-chip">House Items</a>
        <a href="rentals.html" class="category-chip">Rentals</a>
        <a href="studyessentials.html" class="category-chip">Study Essentials</a>
        <a href="roomitems.html" class="category-chip">Room Items</a>
        
    </div>
      
    <!-- HERO BANNER -->
    <section class="hero">
        <h1>Mega Murang'a Deals</h1>
        <p>Making Shopping Easier</p>
        <button class="hero-btn" onclick="shopNow()">Start Shopping</button>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="products-section">
        <div class="section-title">Popular Products</div>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be generated by JavaScript -->
        </div>
    </section>
<!-- FOOTER -->
    <footer>
        <div class="footer-links">
            <a href="#about">About Us</a>
            <a href="#contact">Contact</a>
            <a href="#privacy">Privacy</a>
            <a href="#terms">Terms</a>
        </div>
        <p class="footer-text">&copy; 2026 SokoHub. All rights reserved. | Making Shopping Easier for Murang'a</p>
    </footer>

    <script src="sokohub.js"></script>
</body>
</html>
