<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Items - SokoHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
    <style>
        .hero { background: linear-gradient(135deg, #059669 0%, #34d399 100%); }
        .hero h1 { color: white; }
        .hero p { color: rgba(255,255,255,0.9); }
        .category-chip.active { background: #059669; color: white; }
        .section-title { color: #059669; }
        .page-crumb { display: flex; gap: 8px; padding: 12px 20px; background: #f6f7f9; }
        .page-crumb a { color: #059669; text-decoration: none; }
        .page-crumb span { color: #888; }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo"><a href="index.html"><img src="sokohub.jpg" alt="SokoHub" class="site-logo"></a></div>
            <div class="header-icons"><a href="login.html" class="header-btn account-btn">👤 Account</a><a href="cart.html" class="header-btn cart-btn">🛒 Cart <span id="cartCount" class="cart-badge"></span></a></div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search room items...">
            <button class="search-btn">Search</button>
        </div>
    </header>
    <div class="page-crumb"><a href="index.html">Home</a><span class="separator">›</span><span>Room Items</span></div>
    <div class="categories"><a href="index.html" class="category-chip">All</a><a href="roomitems.html" class="category-chip active">Room Items</a></div>
    <section class="hero"><h1>Upgrade Your Room</h1><p>Stylish furniture and accessories</p><button class="hero-btn" onclick="document.getElementById('productsGrid').scrollIntoView({behavior:'smooth'})">Start Shopping</button></section>
    <section class="products-section"><div class="section-title">Available Products</div><div class="products-grid" id="productsGrid"></div></section>
    <footer><div class="footer-links"><a href="#about">About Us</a><a href="#contact">Contact</a><a href="#privacy">Privacy</a><a href="#terms">Terms</a></div><p class="footer-text">&copy; 2026 SokoHub. All rights reserved.</p></footer>
    <script src="roomitems.js"></script>
</body>
</html>
