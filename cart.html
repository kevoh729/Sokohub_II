<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SokoHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
    <style>
        body { background: #f6f7f9; min-height: 100vh; }
        .cart-wrapper { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; }
        .cart-title { font-size: 32px; font-weight: 700; color: #222; }
        .cart-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .cart-card { display: flex; gap: 16px; padding: 16px; background: white; border-radius: 12px; border: 1px solid #eee; align-items: center; }
        .cart-emoji { font-size: 48px; width: 70px; text-align: center; flex-shrink: 0; }
        .cart-details { flex: 1; }
        .cart-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .cart-price { color: #d62828; font-weight: 700; }
        .cart-qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .qty-btn { width: 28px; height: 28px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .qty-btn:hover { background: #f5f5f5; }
        .qty-num { font-weight: 600; min-width: 24px; text-align: center; }
        .remove-btn { color: #d62828; background: none; border: none; cursor: pointer; font-size: 12px; margin-left: auto; font-weight: 600; }
        .remove-btn:hover { text-decoration: underline; }
        .empty-cart { text-align: center; padding: 60px 20px; background: white; border-radius: 12px; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .empty-text { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .empty-sub { color: #888; margin-bottom: 20px; }
        @media (max-width: 768px) {
            .cart-card { flex-wrap: wrap; padding: 12px; }
            .cart-emoji { width: 50px; height: 50px; font-size: 36px; }
            .cart-name { font-size: 14px; }
            .cart-price { font-size: 14px; }
            .remove-btn { width: 100%; text-align: center; margin-top: 8px; padding: 8px; }
            .cart-header { flex-direction: column; gap: 12px; align-items: flex-start; }
            .cart-title { font-size: 24px; }
            .cart-wrapper { margin: 20px auto; }
        }
        
        @media (max-width: 480px) {
            .cart-card { flex-direction: column; text-align: center; }
            .cart-qty { justify-content: center; }
            .remove-btn { margin-left: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo"><a href="index.html"><img src="sokohub.jpg" alt="SokoHub" class="site-logo"></a></div>
            <div class="header-icons">
                <a href="goin.html" class="header-btn account-btn">👤 Account</a>
                <a href="cart.html" class="header-btn cart-btn">🛒 Cart <span id="cartCount" class="cart-badge"></span></a>
            </div>
        </div>
    </header>

    <div class="cart-wrapper">
        <div class="cart-header">
            <h1 class="cart-title">Your Cart</h1>
            <a href="index.html" class="header-btn home-btn">Home</a>
        </div>
        <div id="cartList" class="cart-list"></div>
        <div id="emptyState" class="empty-cart" style="display:none;">
            <div class="empty-icon">🛒</div>
            <div class="empty-text">Your cart is empty</div>
            <div class="empty-sub">Browse products and add to cart</div>
            <a href="index.html" class="header-btn cart-btn">Browse Products</a>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('sokohubCart')) || [];

        function goToProduct(index) {
    const item = cart[index];
    if (!item) return;
    const params = new URLSearchParams();
    params.set('name', item.name || 'Product');
    params.set('price', item.price || 'Ksh 0');
    params.set('desc', item.description || item.desc || '');
    
    // Handle images - could be array, string, or single value
    let images = 'sokohub.jpg';
    if (item.images) {
        if (Array.isArray(item.images)) {
            images = item.images.filter(img => img).join(',') || 'sokohub.jpg';
        } else if (typeof item.images === 'string') {
            images = item.images;
        }
    }
    params.set('images', images);
    
    if (item.whatsapp) params.set('whatsapp', item.whatsapp);
    if (item.category) params.set('category', item.category);
    window.location.href = 'product.html?' + params.toString();
}

function renderCart() {
            const list = document.getElementById('cartList');
            const empty = document.getElementById('emptyState');
            updateCartCount();

            if (cart.length === 0) {
                list.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            list.style.display = 'flex';
            empty.style.display = 'none';

            list.innerHTML = cart.map((item, i) => `
                <div class="cart-card" onclick="goToProduct(${i})" style="cursor:pointer">
                    <div class="cart-emoji">
                        ${item.images && item.images[0] ? `<img src="${item.images[0]}" alt="${item.name}" onerror="this.parentElement.innerHTML='📦'" style="width:100%;height:100%;object-fit:cover;">` : (item.emoji || '📦')}
                    </div>
                    <div class="cart-details">
                        <div class="cart-name">${item.name}</div>
                        <div class="cart-price">${item.price}</div>
                        <div class="cart-qty">
                            <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
                            <span class="qty-num">${item.quantity || 1}</span>
                            <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                        </div>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
                </div>
            `).join('');
        }

        function changeQty(index, delta) {
            if (cart[index]) {
                cart[index].quantity = (cart[index].quantity || 1) + delta;
                if (cart[index].quantity <= 0) {
                    removeItem(index);
                } else {
                    localStorage.setItem('sokohubCart', JSON.stringify(cart));
                    renderCart();
                }
            }
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('sokohubCart', JSON.stringify(cart));
            renderCart();
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const el = document.getElementById('cartCount');
            if (el) el.textContent = count > 0 ? count : '';
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
