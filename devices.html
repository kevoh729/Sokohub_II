<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices - SokoHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
    <link rel="stylesheet" href="devices.css">
    <link rel="preload" href="devices.js" as="script">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
                <div class="logo">
                    <a href="index.html" aria-label="SokoHub home">
                        <img src="sokohub.jpg" alt="SokoHub logo" class="site-logo">
                    </a>
                </div>
            <div class="header-icons">
                <a href="login.html" class="login-link" title="Login">👤</a>
                <span onclick="goToCart()" style="cursor: pointer;">🛒</span>
            </div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search devices...">
            <button class="search-btn">Search</button>
        </div>
    </header>

    <div class="page-crumb" aria-hidden="false">
        <a href="index.html">Home</a>
        <span class="separator">›</span>
        <span>Devices</span>
    </div>

    <!-- CATEGORIES SCROLL -->
    <div class="categories" id="categoriesScroll">
        <button class="category-chip active" onclick="filterCategory(this)">All</button>
        <button class="category-chip" onclick="filterCategory(this)">Laptops</button>
        <button class="category-chip" onclick="filterCategory(this)">Used Laptops</button>
        <button class="category-chip" onclick="filterCategory(this)">Keyboards & Mice</button>
        <button class="category-chip" onclick="filterCategory(this)">External HDD & SSD</button>
        <button class="category-chip" onclick="filterCategory(this)">USB Flash Drives</button>
        <button class="category-chip" onclick="filterCategory(this)">Mobile Devices</button>
        <button class="category-chip" onclick="filterCategory(this)">Smartwatches</button>
        <button class="category-chip" onclick="filterCategory(this)">Powerbanks</button>
        <button class="category-chip" onclick="filterCategory(this)">Chargers</button>
        <button class="category-chip" onclick="filterCategory(this)">Phone & Laptop Stands</button>
        <button class="category-chip" onclick="filterCategory(this)">Earbuds</button>
        <button class="category-chip" onclick="filterCategory(this)">Headphones</button>
        <button class="category-chip" onclick="filterCategory(this)">Bluetooth Speakers</button>
        <button class="category-chip" onclick="filterCategory(this)">Microphones</button>
        <button class="category-chip" onclick="filterCategory(this)">TVs</button>
        <button class="category-chip" onclick="filterCategory(this)">Desk Lamps</button>
        <button class="category-chip" onclick="filterCategory(this)">Fans</button>
        <button class="category-chip" onclick="filterCategory(this)">Extension Cables</button>
        <button class="category-chip" onclick="filterCategory(this)">Routers/WiFi Devices</button>
        <button class="category-chip" onclick="filterCategory(this)">SD Cards</button>
    </div>
      
    <!-- HERO BANNER -->
    <section class="hero">
        <h1>Devices & Electronics</h1>
        <p>Your one-stop shop for all tech devices</p>
        <button class="hero-btn" onclick="shopNow()">Start Shopping</button>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="products-section">
        <div class="section-title">Popular Devices</div>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be generated by JavaScript -->
        </div>
    </section>

    <!-- BOTTOM NAVIGATION (MOBILE) -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchNav(this, 'home')">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'browse')">
            <span class="nav-icon">🔍</span>
            <span>Browse</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'cart')">
            <span class="nav-icon">🛒</span>
            <span>Cart</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'saved')">
            <span class="nav-icon">❤️</span>
            <span>Saved</span>
        </div>
    </nav>

    <!-- FOOTER -->
    <footer>
        <div class="footer-links">
            <a href="#about">About Us</a>
            <a href="#contact">Contact</a>
            <a href="#privacy">Privacy</a>
            <a href="#terms">Terms</a>
        </div>
        <p class="footer-text">&copy; 2026 SokoHub. All rights reserved. | Making Shopping Easier for Murang'a</p>
    </footer>

    <script src="sokohub.js"></script>
    <script src="devices.js"></script>
</body>
</html>
